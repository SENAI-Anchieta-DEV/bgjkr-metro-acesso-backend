spring.profiles.active=prod

spring.application.name=MetroAcesso

# ===============================
# Configuraçăo JWT (exemplo)
# ===============================
# ${JWT_SECRET}
security.jwt.secret=mysupersecretkeymysupersecretkey123!
security.jwt.expiration=600

security.jwt.access-exp-min=15
security.jwt.refresh-exp-days=7

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate=ERROR



