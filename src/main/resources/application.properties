spring.profiles.active=prod

spring.application.name=MetroAcesso

# Banco de dados (MySQL local)
spring.datasource.url=jdbc:mysql://localhost:3306/metro_acesso?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=senaisp

# ===============================
# ConfigurańŃo JWT (exemplo)
# ===============================
# ${JWT_SECRET}
security.jwt.secret=mysupersecretkeymysupersecretkey123!
security.jwt.expiration=600

security.jwt.access-exp-min=15
security.jwt.refresh-exp-days=7

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate=ERROR

# Servidor
server.address=0.0.0.0
server.port=8080

# MQTT basico (nao bloqueia testes de API/DB)
mqtt.broker-url=tcp://localhost:1883
mqtt.client-id=app-local
mqtt.clean-session=true
mqtt.automatic-reconnect=true
mqtt.keep-alive-interval=60
mqtt.connection-timeout=30
mqtt.default-qos=1