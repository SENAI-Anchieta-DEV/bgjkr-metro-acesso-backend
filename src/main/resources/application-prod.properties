# Banco de dados
spring.datasource.url=jdbc:mysql://prod-server:3306/metro_acesso
spring.datasource.username=prod_user
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Configuracao do Admin provisorio
sistema.admin.email=${ADMIN_EMAIL}
sistema.admin.senha=${ADMIN_SENHA}

# JWT / Spring Security
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=600
security.jwt.access-exp-min=15
security.jwt.refresh-exp-days=7

# MQTT SSL
mqtt.broker-url=ssl://meu-broker:8883
javax.net.ssl.trustStore=classpath:meu_truststore.jks
javax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD}
javax.net.ssl.trustStoreType=JKS

# Springdoc e Swagger UI
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false