# ===============================
# Banco de dados (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=require
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# Admin provisório
# ===============================
sistema.admin.email=${ADMIN_EMAIL}
sistema.admin.senha=${ADMIN_SENHA}

# ===============================
# JWT / Spring Security
# ===============================
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=600
security.jwt.access-exp-min=15
security.jwt.refresh-exp-days=7

# ===============================
# CORS e URL pública
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.public-base-url=${APP_PUBLIC_BASE_URL}

# ===============================
# MQTT
# ===============================
mqtt.broker-url=${MQTT_BROKER_URL}

# ===============================
# Swagger (desabilitado em prod)
# ===============================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ===============================
# Servidor
# ===============================
server.address=0.0.0.0
server.port=${PORT:8080}